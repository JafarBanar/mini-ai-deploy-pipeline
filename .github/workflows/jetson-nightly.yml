name: Jetson Nightly Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  jetson-benchmark:
    runs-on: [self-hosted, linux, arm64, jetson]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Jetson power/perf setup
        run: |
          ./deploy/jetson/check_env.sh
          ./deploy/jetson/setup_power.sh 0

      - name: Build ONNX model artifact
        run: |
          python src/train.py --out artifacts/model.pt --epochs 1 --batch-size 64
          python src/export_onnx.py --checkpoint artifacts/model.pt --onnx artifacts/model.onnx

      - name: Run ORT + TRT backend matrix on Jetson
        run: |
          MODE=e2e WARMUP=50 ITERS=500 THRESHOLD_ORT=1.10 THRESHOLD_TRT=1.10 BUILD_ENGINE=1 ./deploy/jetson/run_backend_matrix.sh

      - name: Upload Jetson benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jetson-benchmark-artifacts
          path: |
            artifacts/bench_ort_jetson.json
            artifacts/bench_trt.json
            artifacts/backend_compare.json
            artifacts/telemetry/ort_jetson.jsonl
            artifacts/trtexec.log
