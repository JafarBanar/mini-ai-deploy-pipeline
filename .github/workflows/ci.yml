name: CI

on:
  push:
  pull_request:

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export ONNX
        run: |
          python -c "import os; os.makedirs('artifacts', exist_ok=True)"
          python src/train.py --out artifacts/model.pt --epochs 2 --batch-size 64
          python src/export_onnx.py --checkpoint artifacts/model.pt --onnx artifacts/model.onnx

      - name: Parity check (PyTorch vs ONNX)
        run: |
          python src/parity_check.py --checkpoint artifacts/model.pt --onnx artifacts/model.onnx

      - name: Run tests
        run: |
          pytest -q

      - name: Benchmark ORT
        run: |
          python src/benchmark.py --backend ort --model artifacts/model.onnx --mode core --out artifacts/bench.json --telemetry-jsonl artifacts/telemetry_ci.jsonl

      - name: Regression gate (p95)
        run: |
          python src/gate_regression.py --current artifacts/bench.json --baseline artifacts/baseline.json --threshold 1.05

      - name: Accuracy compare (PyTorch vs ONNX)
        run: |
          python src/accuracy_compare.py --checkpoint artifacts/model.pt --onnx artifacts/model.onnx --val-samples 1024

      - name: Quantize ONNX and compare benchmark
        run: |
          python src/quantize_onnx.py --in-onnx artifacts/model.onnx --out-onnx artifacts/model.int8.onnx --per-channel
          python src/benchmark_compare.py --fp32-onnx artifacts/model.onnx --int8-onnx artifacts/model.int8.onnx --out artifacts/bench_compare.json

      - name: Benchmark sweep
        run: |
          python src/experiment_grid.py --onnx artifacts/model.onnx --mode core --batch-sizes 1,4 --warmups 20 --iters-list 100 --out artifacts/experiments.json

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-benchmark-artifacts
          path: |
            artifacts/bench.json
            artifacts/bench_compare.json
            artifacts/experiments.json
            artifacts/telemetry_ci.jsonl
